name: Build Android APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: Install Android dependencies
      run: |
        sudo apt update
        sudo apt install -y git python3-pip build-essential
        sudo apt install -y libsdl2-dev libsdl2-image-dev libsdl2-mixer-dev libsdl2-ttf-dev
        sudo apt install -y libportmidi-dev libswscale-dev libavformat-dev libavcodec-dev
        sudo apt install -y zlib1g-dev libssl-dev default-jdk
    
    - name: Set up Android SDK
      uses: android-actions/setup-android@v2
      with:
        api-level: 33
        ndk: 25b
    
    - name: Configure environment
      run: |
        echo "ANDROID_HOME=$ANDROID_HOME" >> $GITHUB_ENV
        echo "ANDROID_NDK_HOME=$ANDROID_NDK_HOME" >> $GITHUB_ENV
        echo "$ANDROID_HOME/cmdline-tools/latest/bin:$ANDROID_HOME/platform-tools" >> $GITHUB_PATH
    
    - name: Install Python packages
      run: |
        pip install --upgrade pip
        pip install kivy==2.3.1 yt-dlp==2024.1.0 buildozer cython
    
    - name: Initialize buildozer
      run: |
        buildozer init
        buildozer android deploy
    
    - name: Build APK
      run: |
        buildozer android debug
    
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: android-apk
        path: bin/*.apk
        if-no-files-found: warn
